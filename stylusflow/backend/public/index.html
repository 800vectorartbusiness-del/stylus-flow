<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Creative Stylus Remote Mouse + Drawing (FIXED)</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(270deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
  background-size: 800% 800%;
  animation: gradientBG 20s ease infinite;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: none;
}

@keyframes gradientBG {
  0% {background-position:0% 50%}
  50% {background-position:100% 50%}
  100% {background-position:0% 50%}
}

h2 { color: #fff; margin-top: 20px; }

#trackpad {
  border: 2px solid #fff;
  border-radius: 12px;
  margin-top: 20px;
  touch-action: none;
  width: 800px;
  height: 600px;
  background: rgba(255,255,255,0.2);
}

#remotePointer {
  position: fixed;
  width: 20px;
  height: 20px;
  background: blue;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 9999;
}

#toggle {
  margin-top: 15px;
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>Creative Stylus Remote Mouse 🎨</h2>

<canvas id="trackpad" width="800" height="600"></canvas>
<div id="remotePointer"></div>
<button id="toggle">Switch to Drawing ✏️</button>

<script>
const trackpad = document.getElementById("trackpad");
const ctx = trackpad.getContext("2d");
const pointer = document.getElementById("remotePointer");
const toggleBtn = document.getElementById("toggle");

let ws = new WebSocket("wss://stylus-flow-yuxj.onrender.com");

let drawingMode = false;
let isDrawing = false;

// 🔥 FIX: proper coordinate mapping
function getPos(e){
  let rect = trackpad.getBoundingClientRect();
  return {
    x: (e.touches[0].clientX - rect.left) / rect.width,
    y: (e.touches[0].clientY - rect.top) / rect.height
  };
}

// MODE TOGGLE (❌ NO CLEAR CANVAS NOW)
toggleBtn.onclick = () => {
  drawingMode = !drawingMode;
  toggleBtn.textContent = drawingMode
    ? "Switch to Mouse 🖱️"
    : "Switch to Drawing ✏️";
};

// TOUCH START
trackpad.addEventListener("touchstart", (e) => {
  let p = getPos(e);

  if (drawingMode) {
    isDrawing = true;
    ws.send(JSON.stringify({ type: "drawstart" }));
  } else {
    ws.send(JSON.stringify({ type: "click", action: "down" }));
  }

  ws.send(JSON.stringify({ type: "move", x: p.x, y: p.y }));
});

// TOUCH MOVE
trackpad.addEventListener("touchmove", (e) => {
  let p = getPos(e);

  if (drawingMode && isDrawing) {
    ws.send(JSON.stringify({ type: "draw", x: p.x, y: p.y }));
  } else {
    ws.send(JSON.stringify({ type: "move", x: p.x, y: p.y }));
  }
});

// TOUCH END
trackpad.addEventListener("touchend", () => {
  if (drawingMode) {
    isDrawing = false;
    ws.send(JSON.stringify({ type: "drawend" }));
  } else {
    ws.send(JSON.stringify({ type: "click", action: "up" }));
  }
});
</script>

</body>
